{% extends "base.html" %}

{% block title %}Student Dashboard{% endblock %}

{% block content %}
<h2>Student Dashboard</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Enrolled Courses</div>
            <div class="card-body">
                <!-- TODO: List enrolled courses -->
                <a href="{{ url_for('courses') }}" class="btn btn-primary">Browse Courses</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Profile</div>
            <div class="card-body">
                <p>Username: {{ current_user.username }}</p>
                <a href="#" class="btn btn-secondary">Edit Profile</a>
            </div>
        </div>
    </div>
</div>
<div class="row mt-4">
    <div class="col-md-6">
        <a href="{{ url_for('lectures') }}" class="btn btn-success w-100 mb-2">Lectures</a>
    </div>
    <div class="col-md-6">
        <a href="{{ url_for('notes') }}" class="btn btn-info w-100 mb-2">Notes</a>
    </div>
</div>
{% endblock %}
